name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install actionlint
        run: |
          curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- latest /usr/local/bin

      - name: Lint GitHub Actions workflows
        run: actionlint

      - name: Install hadolint
        run: |
          curl -sSL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfile
        run: hadolint .github/.devcontainer/Dockerfile

      - name: Lint shell scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck --severity=warning test/*.sh prompt.sh

      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $results = @()
          $results += Invoke-ScriptAnalyzer -Path ./prompt.ps1 -Severity Warning
          $results += Invoke-ScriptAnalyzer -Path ./scripts/ -Recurse -Severity Warning
          if ($results.Count -gt 0) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $($results.Count) issue(s)."
          }

      - name: Validate JSON files
        run: |
          errors=0
          for f in \
            .devcontainer/devcontainer.json \
            .github/.devcontainer/devcontainer.json \
            .github/.labels.json \
            .opencode/opencode.json \
            .vscode/settings.json \
            global.json \
            opencode.json \
            test/fixtures/*.json; do
            if ! jq empty "$f" 2>&1; then
              echo "::error file=$f::Invalid JSON"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors JSON validation error(s)."
            exit 1
          fi

      - name: Validate devcontainer.json
        run: |
          npx --yes @devcontainers/cli validate --workspace-folder . || true

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f7f12e21bd7b35fc # v19.0.0
        with:
          globs: |
            **/*.md
            !.opencode/node_modules/**
            !node_modules/**

      - name: Check for typos
        uses: crate-ci/typos@b1ae8d918b6e85bd611117d3d9a3be4f9633f4ad # v1.29.10
        with:
          config: .typos.toml

  scan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.8
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  test-prompt-assembly:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run prompt assembly tests
        run: bash test/test-prompt-assembly.sh

  test-devcontainer-build:
    needs: lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    # Only run the expensive build when devcontainer files change
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files_url, '.devcontainer') ||
      true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and clean devcontainer image metadata
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/devcontainer:main-latest"
          docker pull "$IMAGE" || true
          # If prebuilt image is not available yet, build a local fallback image
          # so devcontainers/ci can still run smoke tests on this commit.
          if ! docker image inspect "$IMAGE" > /dev/null 2>&1; then
            docker build \
              -f .github/.devcontainer/Dockerfile \
              -t "$IMAGE" \
              .github/.devcontainer
          fi
          # Strip stale devcontainer.metadata label from cached prebuild
          if docker image inspect "$IMAGE" > /dev/null 2>&1; then
            echo "FROM $IMAGE" | docker build --label devcontainer.metadata='[]' -t "$IMAGE" -
          fi

      - name: Build devcontainer and run smoke tests
        uses: devcontainers/ci@8bf61b26e9c3a98f69cb6ce2f88d24ff59b785c6 # v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}/devcontainer
          cacheFrom: ghcr.io/${{ github.repository }}/devcontainer
          push: never
          runCmd: bash test/test-devcontainer-tools.sh
